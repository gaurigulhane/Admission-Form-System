<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Feedback Registration Form</title>
    <!-- Google Fonts for premium typography -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    
    <!-- Internal CSS as requested in subtask 2 -->
    <style>
        /* Internal CSS for basic structure */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        .container {
            width: 100%;
            max-width: 650px;
            position: relative;
            z-index: 10;
        }
    </style>
    <!-- External CSS for styling -->
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <!-- Animated background decorators for Glassmorphism -->
    <div class="blob blob-1"></div>
    <div class="blob blob-2"></div>
    <div class="blob blob-3"></div>
    
    <div class="container">
        <form id="feedbackForm" onsubmit="return validateForm()">
            <h2>Student Feedback</h2>
            
            <div class="form-group">
                <label for="studentName">Student Name *</label>
                <input type="text" id="studentName" name="studentName" placeholder="Enter your full name">
                <small class="error-message" id="nameError"></small>
            </div>

            <div class="form-group">
                <label for="email">Email ID *</label>
                <input type="text" id="email" name="email" placeholder="example@domain.com">
                <small class="error-message" id="emailError"></small>
            </div>

            <div class="form-group">
                <label for="mobile">Mobile Number *</label>
                <input type="text" id="mobile" name="mobile" placeholder="10-digit mobile number">
                <small class="error-message" id="mobileError"></small>
            </div>

            <div class="form-group">
                <label for="department">Department *</label>
                <select id="department" name="department">
                    <option value="">Select Department</option>
                    <option value="Computer Science">Computer Science</option>
                    <option value="Information Technology">Information Technology</option>
                    <option value="Mechanical">Mechanical</option>
                    <option value="Electrical">Electrical</option>
                    <option value="Civil">Civil</option>
                </select>
                <small class="error-message" id="deptError"></small>
            </div>

            <div class="form-group">
                <label>Gender *</label>
                <div class="radio-group">
                    <label><input type="radio" id="genderMale" name="gender" value="Male"> Male</label>
                    <label><input type="radio" id="genderFemale" name="gender" value="Female"> Female</label>
                    <label><input type="radio" id="genderOther" name="gender" value="Other"> Other</label>
                </div>
                <small class="error-message" id="genderError"></small>
            </div>

            <div class="form-group">
                <label for="feedback">Feedback Comments *</label>
                <textarea id="feedback" name="feedback" rows="4" placeholder="Minimum 10 words required..."></textarea>
                <small class="error-message" id="feedbackError"></small>
            </div>

            <div class="button-group">
                <button type="submit" id="submitBtn">Submit Feedback</button>
                <button type="reset" id="resetBtn" onclick="clearErrors()">Reset Form</button>
            </div>
            
            <div id="successMessage" class="success-message" style="display: none;">
                Form submitted successfully! Thank you for your feedback.
            </div>
        </form>
    </div>

    <!-- External JS for validation -->
    <script src="script.js"></script>
</body>
</html>
